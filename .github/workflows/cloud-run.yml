name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-production
  cancel-in-progress: false

env:
  PROJECT_ID: scottchen-b2b-prod-2026
  REGION: asia-east1
  REPOSITORY: cloud-run
  SERVICE: scottchen-b2b
  DEPLOYER_SERVICE_ACCOUNT: github-deployer@scottchen-b2b-prod-2026.iam.gserviceaccount.com
  RUNTIME_SERVICE_ACCOUNT: scottchen-runtime@scottchen-b2b-prod-2026.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/530847966105/locations/global/workloadIdentityPools/github/providers/scottchen

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Build container image
        shell: bash
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          BUILD_ID="$(gcloud builds submit \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --tag="${IMAGE}" \
            --async \
            --format="value(id)" \
            --quiet \
            .)"

          echo "Cloud Build: ${BUILD_ID}"
          for attempt in {1..120}; do
            STATUS="$(gcloud builds describe "${BUILD_ID}" \
              --project="${PROJECT_ID}" \
              --region="${REGION}" \
              --format="value(status)")"

            case "${STATUS}" in
              SUCCESS)
                echo "Container build completed successfully."
                exit 0
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Container build failed with status: ${STATUS}"
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done

          echo "Timed out waiting for Cloud Build."
          exit 1

      - name: Deploy Cloud Run service
        shell: bash
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=30s \
            --quiet

      - name: Show service URL
        shell: bash
        run: |
          gcloud run services describe "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format="value(status.url)"
