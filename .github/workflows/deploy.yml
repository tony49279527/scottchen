name: Build and Deploy Static Site to SiteGround

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SITEGROUND_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Add SiteGround host to known_hosts to prevent verification prompts
          ssh-keyscan -p ${{ secrets.SITEGROUND_PORT }} -H "${{ secrets.SITEGROUND_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to SiteGround via Rsync
        run: |
          # Sync dist directory to public_html path via SSH
          rsync -avz --delete -e "ssh -p ${{ secrets.SITEGROUND_PORT }}" dist/ ${{ secrets.SITEGROUND_USER }}@${{ secrets.SITEGROUND_HOST }}:${{ secrets.SITEGROUND_PATH }}
