name: Production SEO Smoke Check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

jobs:
  seo-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check production SEO basics
        run: node scripts/seo-smoke-check.mjs
